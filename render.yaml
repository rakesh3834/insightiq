services:
  - type: web
    name: insightiq
    runtime: python
    plan: free
    # Build the ML artifacts (SQLite warehouse + Chroma vector DB + reports) at
    # BUILD time — not on every boot. This keeps the 512MB runtime instance from
    # OOM-ing / timing out the health check while it rebuilds the pipeline; it
    # just serves the pre-built artifacts baked into the deploy.
    buildCommand: pip install -r requirements.txt && python scripts/run_all.py
    startCommand: python -m scripts.start_api
    healthCheckPath: /health
    envVars:
      # Artifacts already built during buildCommand — don't rebuild on boot.
      - key: INSIGHTIQ_REBUILD_ON_START
        value: "false"
      # Deploys fully offline (deterministic fallbacks) — no token required.
      # To enable real LLM + HF embeddings/sentiment: add HF_TOKEN in the Render
      # dashboard and flip these two flags to "true".
      - key: INSIGHTIQ_USE_HF_EMBEDDINGS
        value: "false"
      - key: INSIGHTIQ_USE_HF_SENTIMENT
        value: "false"
      - key: HF_LLM_MODEL
        value: meta-llama/Llama-3.1-8B-Instruct
      - key: HF_TOKEN
        sync: false
